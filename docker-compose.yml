version: "3.9"

# ─── openpay-smart-service local dev stack ───────────────────────────────────
# Usage:
#   docker compose up -d          # start all services (runs migrations first)
#   docker compose logs -f server # tail service logs
#   docker compose down -v        # tear down + remove volumes

services:

  # ── gRPC server ─────────────────────────────────────────────────────────────
  server:
    build:
      context: .
      dockerfile: Dockerfile
      target: server
    ports:
      - "50051:50051"   # gRPC
      - "8080:8080"     # REST gateway (grpc-gateway)
      - "9090:9090"     # Prometheus metrics
    env_file: .env
    environment:
      OPENPAY_DATABASE_DSN: "postgres://openpay:openpay@postgres:5432/openpay_smart?sslmode=disable"
      OPENPAY_REDIS_ADDR: "redis:6379"
      OPENPAY_KAFKA_BROKERS: "kafka:9092"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    restart: unless-stopped

  # ── Kafka worker (webhook dispatcher + disbursement scheduler) ──────────────
  worker:
    build:
      context: .
      dockerfile: Dockerfile
      target: worker
    env_file: .env
    environment:
      OPENPAY_DATABASE_DSN: "postgres://openpay:openpay@postgres:5432/openpay_smart?sslmode=disable"
      OPENPAY_REDIS_ADDR: "redis:6379"
      OPENPAY_KAFKA_BROKERS: "kafka:9092"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    restart: unless-stopped

  # ── PostgreSQL ───────────────────────────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: openpay
      POSTGRES_PASSWORD: openpay
      POSTGRES_DB: openpay_smart
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U openpay -d openpay_smart"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── Redis ─────────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  # ── Kafka + Zookeeper ────────────────────────────────────────────────────────
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.1
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    volumes:
      - zookeeper_data:/var/lib/zookeeper/data

  kafka:
    image: confluentinc/cp-kafka:7.6.1
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    depends_on:
      - zookeeper
    volumes:
      - kafka_data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD", "kafka-topics", "--bootstrap-server", "localhost:9092", "--list"]
      interval: 10s
      timeout: 10s
      retries: 10

  # ── Kafka UI (optional dev tool) ─────────────────────────────────────────────
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    ports:
      - "8090:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
    depends_on:
      - kafka
    profiles:
      - tools

  # ── Jaeger (distributed tracing) ─────────────────────────────────────────────
  jaeger:
    image: jaegertracing/all-in-one:1.58
    ports:
      - "16686:16686"   # Jaeger UI
      - "14268:14268"   # Collector HTTP
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    profiles:
      - tools

  # ── Database migrations (runs once on startup, then exits) ───────────────────
  # server and worker wait for this with condition: service_completed_successfully
  # so neither ever starts before the schema is ready.
  migrate:
    build:
      context: .
      dockerfile: Dockerfile
      target: migrate
    environment:
      GOOSE_DRIVER: postgres
      GOOSE_DBSTRING: "postgres://openpay:openpay@postgres:5432/openpay_smart?sslmode=disable"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:
  kafka_data:
  zookeeper_data:
